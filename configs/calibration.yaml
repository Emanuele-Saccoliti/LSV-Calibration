experiment:
  name: synthetic-lsv-demo
  seed: 1729
  output_directory: results
  show_plots: true

market:
  spot: 100.0
  rate: 0.02
  dividend_yield: 0.01

synthetic_market:
  quote_source: synthetic
  maturities: [0.25, 0.75, 1.25]
  log_moneyness: [-0.25, -0.125, 0.0, 0.125, 0.25]
  heston:
    kappa: 1.7
    theta: 0.045
    eta: 0.35
    rho: -0.55
    v0: 0.04

heston_calibration:
  initial:
    kappa: 1.3
    theta: 0.05
    eta: 0.30
    rho: -0.40
    v0: 0.05
  maximum_evaluations: 120
  tolerance: 1.0e-7

surface:
  plot_maturities: 31
  plot_log_moneyness: 41
  minimum_log_moneyness: -0.35
  maximum_log_moneyness: 0.35

dupire:
  maturity: 1.0
  time_steps: 8
  log_moneyness_nodes: 9
  minimum_log_moneyness: -0.25
  maximum_log_moneyness: 0.25
  time_step: 0.001
  relative_strike_step: 0.001
  denominator_floor: 1.0e-12
  local_variance_floor: 1.0e-8
  local_variance_cap: 4.0

leverage_calibration:
  paths: 8000
  iterations: 7
  bandwidth: 0.10
  minimum_effective_sample_size: 30.0
  damping: 0.65
  smoothing_sigma: 0.5
  convergence_tolerance: 0.008
  leverage_minimum: 0.05
  leverage_maximum: 5.0

pricing:
  paths: 20000
  seed: 9173
  lower_barrier: 80.0
  upper_barrier: 120.0
  payout: 1.0
  monitoring: continuous

exotic_calibration:
  enabled: true
  calibrated_parameters: [rho]
  lower_bounds: [-0.95]
  upper_bounds: [0.20]
  maximum_evaluations: 8
  tolerance: 1.0e-5
  finite_difference_step: 0.05
  leverage_paths: 5000
  leverage_iterations: 6
  pricing_paths: 10000
  pricing_seed: 9173
